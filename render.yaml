services:
  - type: web
    name: aicig-final
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --workers 1
    envVars:
      - key: HF_TOKEN
        sync: false
      - key: REPLICATE_TOKEN
        sync: false
